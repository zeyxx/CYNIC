    <path d="M181 288 C178 273 172 265 175 253 C177 245 181 240 181 240 C181 240 185 245 186 253 C189 265 183 273 181 288Z" fill="#f97316" opacity="0.8"/>
    <path d="M219 288 C222 273 228 265 225 253 C223 245 219 240 219 240 C219 240 215 245 214 253 C211 265 217 273 219 288Z" fill="#f97316" opacity="0.8"/>

