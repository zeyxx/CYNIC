    <path d="M200 282 C196 263 187 253 191 238 C194 228 200 222 200 222 C200 222 206 228 209 238 C213 253 204 263 200 282Z" fill="#fbbf24"/>
    <path d="M181 288 C178 273 172 265 175 253 C177 245 181 240 181 240 C181 240 185 245 186 253 C189 265 183 273 181 288Z" fill="#f97316" opacity="0.7"/>
    <path d="M219 288 C222 273 228 265 225 253 C223 245 219 240 219 240 C219 240 215 245 214 253 C211 265 217 273 219 288Z" fill="#f97316" opacity="0.7"/>
