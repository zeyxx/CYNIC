version: "3.9"

services:
  # ── DATABASE: PostgreSQL 16 + pgvector ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cynic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cynic_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cynic_py}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cynic} -d ${POSTGRES_DB:-cynic_py}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── LLM: Ollama Local Server ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # ── CORE: CYNIC Organism API ──────────────────────────────────────────
  cynic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cynic
    ports:
      - "58765:58765" # κ-NET Protocol (IPv6/v4)
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cynic}:${POSTGRES_PASSWORD:-cynic_dev}@postgres:5432/${POSTGRES_DB:-cynic_py}
      OLLAMA_URL: http://ollama:11434
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── BOT: Governance Member (Discord) ──────────────────────────────────
  governance-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cynic-governance-bot
    command: ["python", "cynic/bots/governance/bot.py"]
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      # Use the same database as the core organism
      DATABASE_URL: postgresql://${POSTGRES_USER:-cynic}:${POSTGRES_PASSWORD:-cynic_dev}@postgres:5432/${POSTGRES_DB:-cynic_py}
      CYNIC_URL: http://cynic:8765
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      cynic:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - "governance"

volumes:
  pgdata:
  ollama_models:
  cynic_data:
