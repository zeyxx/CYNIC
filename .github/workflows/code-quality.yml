name: Code Quality

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install flake8 black isort mypy pylint

    - name: Check code formatting with black
      continue-on-error: true
      run: |
        black --check cynic tests --diff || true

    - name: Check import sorting with isort
      continue-on-error: true
      run: |
        isort --check-only cynic tests --diff || true

    - name: Lint with flake8
      continue-on-error: true
      run: |
        flake8 cynic tests --count --statistics --max-line-length=127

    - name: Type check with mypy
      continue-on-error: true
      run: |
        mypy cynic --ignore-missing-imports || true

    - name: Comprehensive lint with pylint
      continue-on-error: true
      run: |
        pylint cynic --disable=all --enable=E,F --fail-under=9.0 || true

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Security scan with bandit
      continue-on-error: true
      run: |
        bandit -r cynic -f json -o bandit.json || true
        bandit -r cynic || true

    - name: Check dependencies for vulnerabilities
      continue-on-error: true
      run: |
        safety check --json || true
