id: organ-telegram
tier: 2
domain: social
status: ACTIVE
description: "Telegram channel listener — raw message ingestion to SQLite"
framework: hexagonal-organ

inputs:
  - source: telegram_api
    data: mtproto_stream

outputs:
  - path: ~/.cynic/organs/telegram/messages.db
    format: sqlite
  - path: kernel /observe (domain=telegram)
    format: REST POST

crons:
  - organ-telegram-cron.timer

scripts:
  - name: dispatch.py
    description: Hexagonal architecture entrypoint
  - name: cli.py
    description: Trigger CLI for manual tests
