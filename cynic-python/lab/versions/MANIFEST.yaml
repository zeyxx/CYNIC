measurement_baselines:
  # Before any heuristic change, measure these:
  #   1. confusion_matrix (TP/FP/TN/FN vs ground truth)
  #   2. sensitivity (recall on BARK) and specificity (rejection of false BARK)
  #   3. before/after q_score distribution
  #   4. latency_ms (deterministic must stay <10ms, qwen models <3000ms)

  token_rug_detection:
    before:
      sensitivity: 0.976  # 97.6% of rugs detected (from paper)
      specificity: 0.95   # 95% of legit tokens pass
      latency_ms: 0.5     # deterministic heuristic
    after: null           # Update after tuning

  twitter_spam_detection:
    before:
      sensitivity: 0.75   # 3/4 ground truth cases correct
      specificity: null   # Not measured yet (need larger dataset)
      latency_ms: 2.0     # heuristic, no inference

versioning_rules:
  - "Bump version BEFORE measuring, not after"
  - "Every heuristic change: measure confusion_matrix before/after on 30+ samples"
  - "Track Pearson r between new heuristic and ground truth"
  - "If sensitivity drops >5% relative: revert and discuss"
  - "Artifacts committed to git-tracked JSON files in cynic-python/artifacts/"
  - "Kernel reads artifacts via include_str!() at compile time (not at runtime)"
  - "Every 3 months: re-measure all Dogs against latest ground truth"

