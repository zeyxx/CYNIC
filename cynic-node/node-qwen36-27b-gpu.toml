# cynic-node: qwen36-27b-gpu supervisor on <TAILSCALE_GPU>:8080
# Qwen 3.6 27B IQ3_XXS — 19.7 tok/s gen, RTX 4060 Ti 16GB
# Upgraded from 9B → 27B on 2026-05-19 (inference-lab-27b)

[kernel]
url = "http://<TAILSCALE_CORE>:3030"
api_key_env = "CYNIC_API_KEY"
heartbeat_interval_secs = 40

[dog]
name = "qwen36-27b-gpu"
model = "Qwen3.6-27B-IQ3_XXS.gguf"
# base_url MUST be reachable FROM THE KERNEL, use Tailscale IP
base_url = "http://<TAILSCALE_GPU>:8080/v1"
context_size = 65536
timeout_secs = 60
api_key_env = "CYNIC_LLAMA_API_KEY"

[process]
# Supervise llama-server on port 8080 (Windows, Tailscale-only binding)
# IQ3_XXS @ 27B fits in 16GB VRAM with 33 GPU layers
command = ["C:\\llama.cpp\\llama-server.exe", "--model", "C:\\llama.cpp\\Qwen3.6-27B-IQ3_XXS.gguf", "--n-gpu-layers", "33", "--ctx-size", "65536", "--threads", "6", "--port", "8080", "--host", "<TAILSCALE_GPU>", "--metrics", "--api-key", "${CYNIC_LLAMA_API_KEY}"]
working_dir = "C:\\llama.cpp"
stop_timeout_secs = 10

[restart]
max_attempts = 5
initial_delay_secs = 2
max_delay_secs = 120
min_uptime_secs = 30

[health]
interval_secs = 15
verify_interval_secs = 60
timeout_secs = 10
max_failures = 3
startup_timeout_secs = 180
