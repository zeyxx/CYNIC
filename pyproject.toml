# CYNIC Ruff Configuration — Industrial Grade
target-version = "py313"
line-length = 100

[lint]
# E: Error, F: Pyflakes, B: Flake8-bugbear, I: Isort, N: Pep8-naming
# UP: Pyupgrade, PL: Pylint, TID: Tidy-imports
select = ["E", "F", "B", "I", "N", "UP", "PL", "TID"]
ignore = ["PLR0913"] # Allow more than 5 arguments in constructor (needed for Factory)

[lint.isort]
known-first-party = ["cynic"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

# PYTEST Configuration — Performance Markers & Test Filtering
[tool.pytest.ini_options]
markers = [
    "performance: Marks tests as performance benchmarks (deselect with '-m \"not performance\"')",
    "ci_required: Marks tests that must pass in CI/CD pipeline",
    "asyncio: Marks async tests for pytest-asyncio",
]
testpaths = ["tests"]
asyncio_mode = "auto"
