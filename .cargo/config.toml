[build]
# rustc 1.94 LLVM stack overflow on deep monomorphization (serde+rmcp = 47% of IR).
# rust-lang/rust #103767, #122357, #138561.
# -j 1 is the only reliable setting; -j 2 is flaky under memory pressure.
jobs = 1

[env]
# Increased to 1GB — tower-http 0.6.8 debug build monomorphization pushes past 512MB.
# rustc recommends RUST_MIN_STACK=1073741824 on SIGSEGV from deep codegen stack exhaustion.
RUST_MIN_STACK = "1073741824"
