# cynic-node: qwen35-9b-gpu supervisor on <TAILSCALE_GPU>:8080
# Phase B: auto-spawned, supervised, heartbeating to kernel

[kernel]
url = "http://<TAILSCALE_CORE>:3030"
api_key_env = "CYNIC_API_KEY"
heartbeat_interval_secs = 40

[dog]
name = "qwen35-9b-gpu"
model = "Qwen3.5-9B-Q4_K_M.gguf"
# base_url MUST be reachable FROM THE KERNEL, use Tailscale IP
base_url = "http://<TAILSCALE_GPU>:8080/v1"
context_size = 131072
timeout_secs = 60
api_key_env = "CYNIC_LLAMA_API_KEY"

[process]
# Supervise llama-server on port 8080 (Windows, Tailscale-only binding)
command = ["C:\\llama.cpp\\llama-server.exe", "--model", "C:\\llama.cpp\\Qwen3.5-9B-Q4_K_M.gguf", "--n-gpu-layers", "33", "--ctx-size", "131072", "-ctk", "q8_0", "--threads", "6", "--port", "8080", "--host", "<TAILSCALE_GPU>", "--reasoning-format", "deepseek", "--api-key", "${CYNIC_LLAMA_API_KEY}"]
working_dir = "C:\\llama.cpp"
stop_timeout_secs = 10

[restart]
max_attempts = 5
initial_delay_secs = 2
max_delay_secs = 120
min_uptime_secs = 10

[health]
interval_secs = 15
verify_interval_secs = 60
timeout_secs = 5
max_failures = 3
startup_timeout_secs = 120
