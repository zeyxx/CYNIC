<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYNIC Chat/Code MVP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #ddd;
      background-color: white;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 12px;
      border-radius: 4px;
      word-wrap: break-word;
    }

    .message.user {
      background-color: #e3f2fd;
      margin-left: 24px;
      text-align: right;
    }

    .message.assistant {
      background-color: #f5f5f5;
      margin-right: 24px;
    }

    .message-content {
      font-size: 14px;
      line-height: 1.5;
    }

    .timestamp {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
      margin-bottom: 12px;
    }

    .language {
      font-weight: bold;
      font-size: 12px;
      color: #666;
    }

    .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .status.generated {
      background-color: #c8e6c9;
      color: #2e7d32;
    }

    .status.executing {
      background-color: #fff9c4;
      color: #f57f17;
    }

    .status.error {
      background-color: #ffcdd2;
      color: #c62828;
    }

    .output {
      margin-top: 12px;
      padding: 12px;
      background-color: #e8f5e9;
      border-left: 3px solid #4caf50;
      border-radius: 2px;
      font-size: 13px;
    }

    .error {
      margin-top: 12px;
      padding: 12px;
      background-color: #ffebee;
      border-left: 3px solid #f44336;
      border-radius: 2px;
      font-size: 13px;
      color: #c62828;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
