[build]
# rustc 1.94 LLVM stack overflow on deep monomorphization (serde+rmcp = 47% of IR).
# rust-lang/rust #103767, #122357, #138561.
# -j 1 is the only reliable setting; -j 2 is flaky under memory pressure.
jobs = 1
incremental = false
rustflags = ["-C", "debuginfo=1"]

[env]
# A1 debt: rmcp's generated DWARF and rustc 1.95 incremental metadata are unstable
# on this workspace. Keep repo defaults here so plain `cargo build` uses the same
# stable path as the gates.
RUST_MIN_STACK = "4294967296"
CARGO_INCREMENTAL = "0"

