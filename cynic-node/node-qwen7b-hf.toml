# cynic-node: qwen-7b-hf (API Dog) supervisor on <TAILSCALE_GPU>:8080
# Phase B: auto-spawned, supervised, heartbeating to kernel

[kernel]
url = "http://<TAILSCALE_CORE>:3030"
api_key_env = "CYNIC_API_KEY"
heartbeat_interval_secs = 40

[dog]
name = "qwen-7b-hf"
model = "qwen2.5-7b-instruct.gguf"
# base_url MUST be reachable FROM THE KERNEL, use Tailscale IP
base_url = "http://<TAILSCALE_GPU>:8080/v1"
context_size = 32768
timeout_secs = 60

[process]
# Supervise llama-server on port 8080
command = ["llama-server", "-m", "/models/qwen2.5-7b-instruct.gguf", "--port", "8080", "--ctx-size", "32768"]
working_dir = "/opt/models"
stop_timeout_secs = 10

[restart]
max_attempts = 5
initial_delay_secs = 2
max_delay_secs = 120
min_uptime_secs = 10

[health]
interval_secs = 15
verify_interval_secs = 60
timeout_secs = 5
max_failures = 3
startup_timeout_secs = 120
