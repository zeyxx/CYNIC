version: "3.9"

services:
  # ── DATABASE: SurrealDB (Primary Reality) ─────────────────────────────
  surrealdb:
    image: surrealdb/surrealdb:v1.5.4
    container_name: cynic-surreal
    command: start --user root --pass cynic_phi_618 --bind 0.0.0.0:8000 file://cynic.db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - surreal_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "timeout", "1", "bash", "-c", "</dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NERVOUS BACKBONE: Redis (Distributed Influx) ───────────────────────
  redis:
    image: redis:alpine
    container_name: cynic-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── LLM: Ollama Local Server ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cynic-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # ── CORE: CYNIC Organism API ──────────────────────────────────────────
  cynic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cynic-core
    ports:
      - "8765:8765" # Main API (FastAPI)
      - "58766:58766" # κ-NET Protocol
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: root
      SURREAL_PASS: cynic_phi_618
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      surrealdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  surreal_data:
  ollama_models:
  cynic_data:
