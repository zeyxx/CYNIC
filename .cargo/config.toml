[build]
# rustc 1.94 LLVM stack overflow on deep monomorphization (serde+rmcp = 47% of IR).
# rust-lang/rust #103767, #122357, #138561.
# -j 1 is the only reliable setting; -j 2 is flaky under memory pressure.
jobs = 1

[env]
# Increased from 256MB to 512MB — probe system monomorphization pushes past 256MB threshold.
RUST_MIN_STACK = "536870912"
