name: Auto-Approve & Auto-Merge

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-approve-and-merge:
    if: github.actor == 'zeyxx'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Approve PR
        uses: actions/github-script@v7
        with:
          script: |
            // Only author zeyxx's PRs get auto-approved
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
            });

      - name: Merge PR (squash) + delete branch
        uses: actions/github-script@v7
        with:
          script: |
            // No required status checks — only 1 approval needed.
            // The approval above satisfies that. Merge directly.
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash',
              delete_head_branch: true,
            });
