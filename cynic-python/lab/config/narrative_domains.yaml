# Narrative-to-domain mapping v0.2
# Maps narrative tags (from x_proxy.py _NARRATIVES) to domain IDs.
# Used in assign_domain() for primary domain assignment (before keyword fallback).
#
# CONTRACT: every tag produced by x_proxy.py _NARRATIVES must appear here.
# Falsifiable: grep _NARRATIVES x_proxy.py tags vs this file — zero orphans.

