name: Tech Debt Prevention (AI Amplification Guard)

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  debt-detection:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for comparison

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install analysis tools
      run: |
        pip install radon pylint-json2html pytest-cov

    - name: Detect code complexity drift
      run: |
        echo "📊 Analyzing code complexity..."
        python << 'EOF'
        import os
        import json
        from radon.complexity import cc_visit
        from radon.metrics import mi_visit

        COMPLEXITY_THRESHOLD = 10  # Cyclomatic complexity
        MAINTAINABILITY_THRESHOLD = 70  # Maintainability index

        violations = []

        # Check all Python files
        for root, dirs, files in os.walk('cynic'):
            # Skip test and cache directories
            dirs[:] = [d for d in dirs if d not in ['__pycache__', '.pytest_cache', 'test']]

            for file in files:
                if not file.endswith('.py'):
                    continue

                filepath = os.path.join(root, file)
                try:
                    with open(filepath, 'r') as f:
                        source = f.read()

                    # Check cyclomatic complexity
                    complexity_results = cc_visit(source)
                    for result in complexity_results:
                        if hasattr(result, 'complexity') and result.complexity > COMPLEXITY_THRESHOLD:
                            violations.append({
                                'type': 'HIGH_COMPLEXITY',
                                'file': filepath,
                                'function': result.name,
                                'complexity': result.complexity,
                                'threshold': COMPLEXITY_THRESHOLD
                            })

                    # Check maintainability index
                    mi_results = mi_visit(source, filepath, multi=True)
                    if mi_results < MAINTAINABILITY_THRESHOLD:
                        violations.append({
                            'type': 'LOW_MAINTAINABILITY',
                            'file': filepath,
                            'maintainability_index': mi_results,
                            'threshold': MAINTAINABILITY_THRESHOLD
                        })

                except Exception as e:
                    pass  # Skip files with syntax errors

        if violations:
            print(f"\n⚠️ DEBT DETECTED ({len(violations)} violations):\n")
            for v in violations[:10]:  # Show first 10
                if v['type'] == 'HIGH_COMPLEXITY':
                    print(f"  🔴 {v['file']}::{v['function']}")
                    print(f"     Complexity: {v['complexity']} (threshold: {v['threshold']})")
                elif v['type'] == 'LOW_MAINTAINABILITY':
                    print(f"  🔴 {v['file']}")
                    print(f"     Maintainability: {v['maintainability_index']:.1f} (threshold: {v['threshold']})")

            print(f"\n⚠️ ACTION REQUIRED:")
            print(f"   Refactor high-complexity functions")
            print(f"   Add docstrings and improve readability")
            print(f"   Break large functions into smaller units")
        else:
            print("\n✅ No code complexity issues detected")

        EOF

    - name: Check test coverage trend
      run: |
        echo "📈 Checking test coverage stability..."
        python << 'EOF'
        import subprocess
        import json
        import re

        # Run coverage
        result = subprocess.run(
            ['pytest', 'tests/', '--cov=cynic', '--cov-report=term', '-q'],
            capture_output=True,
            text=True
        )

        # Parse coverage percentage
        match = re.search(r'(\d+)%\s+\(', result.stdout)
        if match:
            coverage = int(match.group(1))
            print(f"\n📊 Current Coverage: {coverage}%")

            MINIMUM = 75
            if coverage < MINIMUM:
                print(f"\n⚠️ COVERAGE BELOW MINIMUM")
                print(f"   Current: {coverage}%")
                print(f"   Minimum: {MINIMUM}%")
                print(f"   Gap: {MINIMUM - coverage}%")
                print(f"\n✋ MUST increase before merge")
            else:
                print(f"\n✅ Coverage above minimum ({MINIMUM}%)")
        EOF

    - name: Detect stub creep
      run: |
        echo "🔍 Checking for unimplemented stubs..."
        python << 'EOF'
        import os
        import re

        STUB_PATTERNS = [
            r'\.\.\.(\s*$)',  # Bare ellipsis
            r'raise\s+NotImplementedError',
            r'pass\s*#\s*TODO',
            r'def\s+\w+\([^)]*\):\s*(?:raise|pass|\.\.\.)',  # Stub methods
        ]

        stubs = []

        for root, dirs, files in os.walk('cynic'):
            dirs[:] = [d for d in dirs if d not in ['__pycache__', '.pytest_cache']]

            for file in files:
                if not file.endswith('.py'):
                    continue

                filepath = os.path.join(root, file)
                try:
                    with open(filepath, 'r') as f:
                        lines = f.readlines()

                    for i, line in enumerate(lines, 1):
                        for pattern in STUB_PATTERNS:
                            if re.search(pattern, line):
                                stubs.append((filepath, i, line.strip()[:60]))
                except:
                    pass

        if stubs:
            print(f"\n⚠️ STUBS FOUND ({len(stubs)} instances):\n")
            for filepath, line_num, code in stubs[:10]:
                print(f"  {filepath}:{line_num}")
                print(f"    {code}...")

            print(f"\n✋ STUBS BLOCK TESTS - Must implement before merge")
        else:
            print("\n✅ No stubs detected")

        EOF

    - name: Comment PR with debt report
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          const comment = `
          ## 🛡️ Tech Debt Prevention Check

          ### ✅ Checks Performed
          - Code complexity analysis
          - Test coverage validation
          - Stub/TODO detection

          ### 🎯 Enforcement Rules
          - **No complex functions** (cyclomatic > 10)
          - **No low maintainability** (index < 70)
          - **Coverage >= 75%** required
          - **No stubs/TODOs** in core code

          ### 💡 AI Amplification Guard Active
          This PR will NOT merge if code quality drops.
          AI-generated code is analyzed same as human code.

          ---
          *Generated by CYNIC CI/CD Debt Prevention*
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  fail-if-debt:
    runs-on: ubuntu-latest
    needs: debt-detection

    steps:
    - name: Quality gate (ENFORCED)
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║      TECH DEBT PREVENTION CHECK - ENFORCED             ║"
        echo "╚════════════════════════════════════════════════════════╝"
        echo ""
        echo "✅ Rules in effect:"
        echo "  • No complex functions (cyclomatic > 10)"
        echo "  • No low maintainability (index < 70)"
        echo "  • Coverage >= 75% required"
        echo "  • No stubs/TODOs in core code"
        echo ""
        echo "AI-generated code is validated same as human code."
        echo "Rapid iteration is an EDGE, not a risk."
        echo ""
