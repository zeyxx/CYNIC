name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true

jobs:
  validate-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=${{ github.event.inputs.version }}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Verify version format
      run: |
        VERSION=${{ steps.version.outputs.version }}
        if [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "✅ Valid version format: $VERSION"
        else
          echo "❌ Invalid version format: $VERSION"
          echo "Expected format: X.Y.Z (e.g., 1.0.0)"
          exit 1
        fi

    - name: Run full test suite
      run: |
        pip install -e .
        pip install pytest pytest-cov
        pytest tests/ -v --tb=short || exit 1

    - name: Build distribution
      run: |
        python -m build

    - name: Check distribution
      run: |
        twine check dist/*

    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        body: |
          # Release ${{ steps.version.outputs.version }}

          ## Changes
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.

          ## Installation
          ```bash
          pip install CYNIC==${{ steps.version.outputs.version }}
          ```

          ## Testing
          All tests passed in this release.
        draft: false
        prerelease: false

    - name: Upload to TestPyPI
      if: github.event_name == 'workflow_dispatch'
      run: |
        twine upload --repository testpypi dist/* \
          -u __token__ \
          -p ${{ secrets.TEST_PYPI_API_TOKEN }} || true

    - name: Upload to PyPI
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      run: |
        twine upload dist/* \
          -u __token__ \
          -p ${{ secrets.PYPI_API_TOKEN }} || true

  changelog-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check CHANGELOG
      run: |
        if [ ! -f "CHANGELOG.md" ]; then
          echo "⚠️  CHANGELOG.md not found"
          echo "Creating template..."
          cat > CHANGELOG.md << 'EOF'
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

### Added
- New features

### Changed
- Changes to existing functionality

### Fixed
- Bug fixes

### Removed
- Removed features

## [1.0.0] - 2024-01-01

### Added
- Initial release
EOF
        fi

        echo "✅ CHANGELOG.md exists"

    - name: Validate version in CHANGELOG
      if: github.event_name == 'push'
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        if grep -q "## \[$VERSION\]" CHANGELOG.md; then
          echo "✅ Version $VERSION found in CHANGELOG"
        else
          echo "⚠️  Version $VERSION not found in CHANGELOG"
        fi
