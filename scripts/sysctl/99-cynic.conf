# CYNIC — suppress kernel fatal-signal dumps to dmesg.
#
# When set to 1, the Linux kernel writes a short message plus register state
# to dmesg every time a process dies from a fatal signal (SIGSEGV, SIGBUS,
# SIGFPE, SIGILL, etc). On the CYNIC workstation, `cargo test --release` and
# `cargo build --release` occasionally hit rustc/LLVM miscompilation crashes
# (rust-lang/rust #103767, #122357, #138561 — see cynic-kernel/Cargo.toml
# profile.release comment for the opt-level=2 workaround). With this value
# at 1 those crashes flood dmesg with register dumps during development.
# Setting to 0 keeps dmesg clean without hiding the actual compiler errors
# which still surface via cargo's stdout/stderr.
#
# To install (one-shot, per machine — run from repo root):
#   sudo install -m 0644 scripts/sysctl/99-cynic.conf /etc/sysctl.d/99-cynic.conf
#   sudo sysctl --system
#   sysctl kernel.print-fatal-signals   # expect: = 0
kernel.print-fatal-signals = 0
