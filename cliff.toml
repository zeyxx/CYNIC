# CYNIC — git-cliff changelog generator config
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog — cynic-kernel\n
All notable changes. Format: [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/tcmusic/CYNIC
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | split(pat="\n") | first | trim }}\
            {% if commit.breaking %} (**BREAKING**){% endif %}\
    {%- endfor %}
{% endfor %}\n
"""
trim = true
footer = ""
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^harden", group = "Hardened" },
    { message = "^burn", group = "Removed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Performance" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "Build" },
    { message = "^rules", group = "Rules" },
    { message = "^release", group = "Release" },
    { message = "^chore", group = "Other" },
    { message = "^revert", group = "Reverted" },
    { message = "^style", skip = true },
    { body = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
