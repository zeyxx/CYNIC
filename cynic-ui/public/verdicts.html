<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYNIC — Verdict Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'JetBrains Mono', monospace; }
    .bar-fill { transition: width 0.3s ease; }
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    .verdict-howl  { background: #14532d; color: #4ade80; border-color: #16a34a; }
    .verdict-wag   { background: #14532d; color: #86efac; border-color: #22c55e; opacity: 0.7; }
    .verdict-growl { background: #713f12; color: #fbbf24; border-color: #d97706; }
    .verdict-bark  { background: #450a0a; color: #f87171; border-color: #dc2626; }
    .verdict-epoche{ background: #1e1e2e; color: #94a3b8; border-color: #475569; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen">

  <!-- HEADER -->
  <div class="border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <span class="text-amber-400 font-bold text-lg">CYNIC</span>
      <span class="text-zinc-600">·</span>
      <span class="text-zinc-400 text-sm">Verdict Explorer</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="kernel-status" class="text-xs px-2 py-1 rounded border border-zinc-700 text-zinc-500">connecting...</span>
      <button onclick="toggleSettings()" class="text-zinc-500 hover:text-zinc-300 text-xs border border-zinc-700 px-3 py-1 rounded">⚙ settings</button>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings-panel" class="hidden border-b border-zinc-800 bg-zinc-900 px-6 py-4">
    <div class="flex gap-4 max-w-3xl">
      <div class="flex-1">
        <label class="text-xs text-zinc-500 mb-1 block">Kernel URL</label>
        <input id="input-url" type="text" value="http://127.0.0.1:3030"
          class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-amber-400">
      </div>
      <div class="flex-1">
        <label class="text-xs text-zinc-500 mb-1 block">API Key</label>
        <input id="input-key" type="password" placeholder="Bearer token..."
          class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-amber-400">
      </div>
      <div class="flex items-end">
        <button onclick="saveSettings()" class="bg-amber-400 text-zinc-950 font-bold px-4 py-2 rounded text-sm hover:bg-amber-300">Connect</button>
      </div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div id="stats-bar" class="border-b border-zinc-800 px-6 py-3 grid grid-cols-2 md:grid-cols-5 gap-4 text-sm">
    <div><span class="text-zinc-500">verdicts (recent)</span> <span id="stat-verdicts" class="text-amber-400 font-bold ml-2">—</span></div>
    <div><span class="text-zinc-500">observations (total)</span> <span id="stat-obs" class="text-amber-400 font-bold ml-2">—</span></div>
    <div><span class="text-zinc-500">crystals</span> <span id="stat-crystals" class="text-amber-400 font-bold ml-2">—</span></div>
    <div><span class="text-zinc-500">dogs</span> <span id="stat-dogs" class="text-amber-400 font-bold ml-2">—</span></div>
    <div><span class="text-zinc-500">uptime</span> <span id="stat-uptime" class="text-amber-400 font-bold ml-2">—</span></div>
  </div>

  <!-- FILTERS -->
  <div class="px-6 py-4 border-b border-zinc-800 flex flex-wrap gap-3 items-center">
    <input id="filter-search" type="text" placeholder="search mint / target..."
      class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-amber-400 w-64"
      oninput="applyFilters()">
    <select id="filter-domain"
      class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-amber-400"
      onchange="applyFilters()">
      <option value="">all domains</option>
    </select>
    <select id="filter-verdict"
      class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-amber-400"
      onchange="applyFilters()">
      <option value="">all verdicts</option>
      <option value="Howl">HOWL</option>
      <option value="Wag">WAG</option>
      <option value="Growl">GROWL</option>
      <option value="Bark">BARK</option>
      <option value="Epoche">EPOCHÉ</option>
    </select>
    <button onclick="loadVerdicts()" class="text-xs border border-zinc-700 px-3 py-2 rounded text-zinc-400 hover:text-zinc-200 hover:border-zinc-500">↻ refresh</button>
    <span id="filter-count" class="text-zinc-600 text-xs ml-auto"></span>
  </div>

  <!-- VERDICT LIST -->
  <div id="verdict-list" class="px-6 py-4 space-y-3 max-w-6xl mx-auto">
    <div class="text-zinc-600 text-sm text-center py-8">Configure API key in settings to load verdicts</div>
  </div>

  <script>
    let allVerdicts = [];
    let config = {
      url: localStorage.getItem('cynic_url') || 'http://127.0.0.1:3030',
      key: localStorage.getItem('cynic_key') || ''
    };

    // Init
    document.getElementById('input-url').value = config.url;
    document.getElementById('input-key').value = config.key;
    if (config.key) { init(); }

    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('hidden');
    }

    function saveSettings() {
      config.url = document.getElementById('input-url').value.trim();
      config.key = document.getElementById('input-key').value.trim();
      localStorage.setItem('cynic_url', config.url);
      localStorage.setItem('cynic_key', config.key);
      document.getElementById('settings-panel').classList.add('hidden');
      init();
    }

    async function api(path) {
      const r = await fetch(config.url + path, {
        headers: { 'Authorization': 'Bearer ' + config.key }
      });
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }

    async function apiHealth() {
      const r = await fetch(config.url + '/health', {
        headers: { 'Authorization': 'Bearer ' + config.key }
      });
      // Accept 200 (sovereign) and 503 (degraded) — both return useful JSON
      if (r.status !== 200 && r.status !== 503) throw new Error(r.status);
      return r.json();
    }

    async function init() {
      try {
        const health = await apiHealth();
        const isDegraded = health.status === 'degraded';
        document.getElementById('kernel-status').textContent = isDegraded ? '● degraded' : '● live';
        document.getElementById('kernel-status').className = isDegraded
          ? 'text-xs px-2 py-1 rounded border border-amber-800 text-amber-400'
          : 'text-xs px-2 py-1 rounded border border-green-800 text-green-400';

        // Stats
        const m = health.storage_metrics || {};
        // observations: sum across all producers
        const totalObs = (health.producers || []).reduce((s, p) => s + (p.observations || 0), 0);
        document.getElementById('stat-obs').textContent = totalObs > 0 ? totalObs.toLocaleString() : '—';
        document.getElementById('stat-crystals').textContent = (health.crystals || {}).total ?? '—';
        document.getElementById('stat-dogs').textContent = (health.dogs || []).filter(d => d.healthy !== false).length + '/' + (health.dogs || []).length;
        const upSecs = health.uptime_seconds;
        document.getElementById('stat-uptime').textContent = upSecs ? formatUptime(upSecs) : '—';

        await loadVerdicts();
      } catch(e) {
        document.getElementById('kernel-status').textContent = '● offline';
        document.getElementById('kernel-status').className = 'text-xs px-2 py-1 rounded border border-red-800 text-red-400';
      }
    }

    async function loadVerdicts() {
      document.getElementById('verdict-list').innerHTML = '<div class="text-zinc-600 text-sm text-center py-8">Loading...</div>';
      try {
        const data = await api('/verdicts?limit=200');
        allVerdicts = Array.isArray(data) ? data : (data.verdicts || []);

        // Update stats
        document.getElementById('stat-verdicts').textContent = allVerdicts.length + (allVerdicts.length >= 200 ? '+' : '');

        // Populate domain filter
        const domains = [...new Set(allVerdicts.map(v => v.domain).filter(Boolean))].sort();
        const sel = document.getElementById('filter-domain');
        sel.innerHTML = '<option value="">all domains</option>';
        domains.forEach(d => {
          const o = document.createElement('option');
          o.value = d; o.textContent = d;
          sel.appendChild(o);
        });

        applyFilters();
      } catch(e) {
        document.getElementById('verdict-list').innerHTML = `<div class="text-red-400 text-sm text-center py-8">Error: ${e.message}</div>`;
      }
    }

    function applyFilters() {
      const search = document.getElementById('filter-search').value.toLowerCase();
      const domain = document.getElementById('filter-domain').value;
      const verdict = document.getElementById('filter-verdict').value;

      let filtered = allVerdicts.filter(v => {
        if (domain && v.domain !== domain) return false;
        if (verdict && v.verdict !== verdict) return false;
        if (search && !JSON.stringify(v).toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById('filter-count').textContent = `${filtered.length} verdicts`;
      renderVerdicts(filtered);
    }

    function renderVerdicts(verdicts) {
      const list = document.getElementById('verdict-list');
      if (!verdicts.length) {
        list.innerHTML = '<div class="text-zinc-600 text-sm text-center py-8">No verdicts match</div>';
        return;
      }

      list.innerHTML = verdicts.slice(0, 100).map(v => renderVerdict(v)).join('');
    }

    function renderVerdict(v) {
      const verdict = v.verdict || 'Unknown';
      const cls = 'verdict-' + verdict.toLowerCase().replace('é','e').replace('è','e');
      const qs = v.q_score || {};
      const total = qs.total ?? v.total ?? 0;
      const reasoning = v.reasoning || {};
      const axioms = ['fidelity','phi','verify','culture','burn','sovereignty'];
      const axiomColors = {
        fidelity: '#60a5fa', phi: '#a78bfa', verify: '#34d399',
        culture: '#f59e0b', burn: '#f97316', sovereignty: '#fb7185'
      };

      const axiomBars = axioms.map(ax => {
        const score = qs[ax] ?? v[ax] ?? 0;
        const pct = Math.round(score * 100);
        const color = axiomColors[ax];
        return `
          <div class="flex items-center gap-2 text-xs">
            <span class="text-zinc-500 w-20 shrink-0">${ax}</span>
            <div class="flex-1 bg-zinc-800 rounded-full h-1.5">
              <div class="bar-fill h-1.5 rounded-full" style="width:${pct}%; background:${color}"></div>
            </div>
            <span class="text-zinc-400 w-8 text-right">${pct}%</span>
          </div>`;
      }).join('');

      const reasoningHtml = axioms.filter(ax => reasoning[ax]).map(ax => `
        <div class="mb-2">
          <span class="text-zinc-500 text-xs">${ax}:</span>
          <span class="text-zinc-300 text-xs ml-1">${reasoning[ax]}</span>
        </div>`).join('');

      const target = v.target || v.verdict_id || '—';
      const shortTarget = target.length > 16 ? target.slice(0,8) + '...' + target.slice(-8) : target;
      const ts = v.timestamp ? new Date(v.timestamp).toLocaleString() : '';

      return `
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 hover:border-zinc-700 transition-colors">
          <div class="flex items-start justify-between mb-4">
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold px-3 py-1 rounded border ${cls}">${verdict.toUpperCase()}</span>
              <div>
                <div class="text-white text-sm font-medium font-mono">${shortTarget}</div>
                <div class="text-zinc-500 text-xs">${v.domain || ''} · ${ts}</div>
              </div>
            </div>
            <div class="text-right">
              <div class="text-2xl font-bold text-amber-400">${(total * 100).toFixed(0)}<span class="text-sm text-zinc-500">%</span></div>
              <div class="text-zinc-500 text-xs">q-score · max 61.8%</div>
            </div>
          </div>

          <!-- Axiom bars -->
          <div class="space-y-1.5 mb-4">
            ${axiomBars}
          </div>

          <!-- Reasoning expandable -->
          ${reasoningHtml ? `
          <details class="mt-3">
            <summary class="text-xs text-zinc-500 hover:text-zinc-300 flex items-center gap-1">
              <span class="details-arrow">▶</span> reasoning
            </summary>
            <div class="mt-2 pl-3 border-l border-zinc-700 space-y-1">
              ${reasoningHtml}
            </div>
          </details>` : ''}

          ${v.dogs_used ? `<div class="mt-2 text-xs text-zinc-600">dogs: ${v.dogs_used}</div>` : ''}
        </div>`;
    }

    function formatUptime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return h > 24 ? Math.floor(h/24) + 'd ' + (h%24) + 'h' : h + 'h ' + m + 'm';
    }

    // Auto-expand details arrow
    document.addEventListener('toggle', e => {
      if (e.target.tagName === 'DETAILS') {
        const arrow = e.target.querySelector('.details-arrow');
        if (arrow) arrow.textContent = e.target.open ? '▼' : '▶';
      }
    }, true);
  </script>

</body>
</html>
