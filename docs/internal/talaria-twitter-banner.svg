  <!-- Product line 1 -->
  <text x="346" y="340" font-family="Courier, monospace" font-size="17" fill="#fbbf24" opacity="0.55">CYNIC</text>
  <text x="408" y="340" font-family="Courier, monospace" font-size="17" fill="#fef3c7" opacity="0.35">  AI judgment engine  sovereign hardware  zero cloud</text>

  <!-- Product line 2 -->
  <text x="346" y="368" font-family="Courier, monospace" font-size="17" fill="#fbbf24" opacity="0.55">Blitz &amp; Chill</text>
  <text x="494" y="368" font-family="Courier, monospace" font-size="17" fill="#fef3c7" opacity="0.35">  Chess proof of humanity  no KYC</text>

