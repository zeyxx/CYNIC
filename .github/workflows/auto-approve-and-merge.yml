name: Auto-Approve & Auto-Merge

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-approve-and-merge:
    if: github.actor == 'zeyxx'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Approve PR
        uses: actions/github-script@v7
        with:
          script: |
            // Only author zeyxx's PRs get auto-approved
            // This prevents approval of external contributions
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
            });

      - name: Enable auto-merge (squash)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            // enableAutoMerge is a GraphQL mutation, not a REST endpoint.
            // continue-on-error: if PR is in unstable status (this workflow
            // is its own check), the approve still landed. Non-fatal.
            const prNumber = context.issue.number;
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber,
            });
            await github.graphql(`
              mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: $mergeMethod
                }) {
                  pullRequest { autoMergeRequest { enabledAt } }
                }
              }
            `, {
              pullRequestId: repository.pullRequest.id,
              mergeMethod: 'SQUASH',
            });

      - name: Confirm
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "✓ PR #${PR_NUMBER} approved. Auto-merge enabled if status allows."
