# cynic-node: qwen36-27b-gpu supervisor on <TAILSCALE_GPU>:8080
# Qwen 3.6 27B IQ3_XXS — 19.7 tok/s gen, RTX 4060 Ti 16GB
# Upgraded from 9B → 27B on 2026-05-19 (inference-lab-27b)
# --parallel 1: -fit optimizer hardcaps at 1 slot on 16GB (tested 2026-05-21).
# VRAM: model 13038 + KV Q4_0 448 = ~13586 / 16380 MiB. 2524 MiB free.
# Slot contention → Soma L2 priority queue (kernel-side), not hardware parallel.
# -ngl 999 -ctk q4_0 -ctv q4_0 match production schtask config.

[kernel]
url = "http://<TAILSCALE_CORE>:3030"
api_key_env = "CYNIC_API_KEY"
heartbeat_interval_secs = 40

[dog]
name = "qwen36-27b-gpu"
model = "Qwen3.6-27B-IQ3_XXS.gguf"
# base_url MUST be reachable FROM THE KERNEL, use Tailscale IP
base_url = "http://<TAILSCALE_GPU>:8080/v1"
context_size = 65536
timeout_secs = 60
api_key_env = "CYNIC_LLAMA_API_KEY"

[process]
# Supervise llama-server on port 8080 (Windows, Tailscale-only binding)
# Flags match production schtask (llama-server-27b ONSTART)
command = ["C:\\llama.cpp\\llama-server.exe", "--model", "C:\\llama.cpp\\Qwen3.6-27B-IQ3_XXS.gguf", "--n-gpu-layers", "999", "--ctx-size", "65536", "--parallel", "1", "--threads", "6", "-ctk", "q4_0", "-ctv", "q4_0", "--reasoning-budget", "0", "--port", "8080", "--host", "<TAILSCALE_GPU>", "--metrics", "--api-key", "${CYNIC_LLAMA_API_KEY}"]
working_dir = "C:\\llama.cpp"
stop_timeout_secs = 10

[restart]
max_attempts = 5
initial_delay_secs = 2
max_delay_secs = 120
min_uptime_secs = 30

[health]
interval_secs = 15
verify_interval_secs = 60
timeout_secs = 10
max_failures = 3
startup_timeout_secs = 180
