services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    working_dir: /app
    command: sh -lc 'if [ ! -f node_modules/.portal-installed ]; then npm ci && touch node_modules/.portal-installed; fi && npm run portal'
    volumes:
      - ../../..:/app
      - cynic_portal_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  cynic_portal_node_modules:
