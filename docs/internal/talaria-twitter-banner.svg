  <!-- TALARIA — textLength forces exact width, no letter-spacing surprise -->
  <text
    x="344"
    y="235"
    font-family="Georgia, serif"
    font-size="116"
    font-weight="700"
    fill="#fbbf24"
    textLength="620"
    lengthAdjust="spacingAndGlyphs"
