# =============================================================================
# CYNIC Governance Bot - Docker Compose Configuration
# =============================================================================
# For local development and testing of the governance bot
#
# Usage:
#   docker-compose -f docker-compose.governance.yml up
#   docker-compose -f docker-compose.governance.yml logs -f
#   docker-compose -f docker-compose.governance.yml down
# =============================================================================

version: '3.9'

services:
  # ==========================================================================
  # Governance Bot (Discord)
  # ==========================================================================
  governance-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.governance
    container_name: cynic-governance-bot
    restart: unless-stopped

    # Environment configuration
    environment:
      # REQUIRED
      DISCORD_TOKEN: ${DISCORD_TOKEN:?Please provide DISCORD_TOKEN}

      # Bot Configuration
      BOT_ENVIRONMENT: development
      BOT_ACTIVITY: governance decisions
      BOT_STATUS: ACTIVE

      # Database (uses SQLite in development)
      DATABASE_URL: sqlite:////app/data/governance_bot.db
      DATABASE_POOL_SIZE: 5
      DATABASE_MAX_OVERFLOW: 10
      DATABASE_BACKUP_ENABLED: "true"
      DATABASE_BACKUP_DIR: /app/backups

      # CYNIC Integration
      CYNIC_URL: http://localhost:8765
      CYNIC_MCP_ENABLED: "true"
      CYNIC_MCP_URL: http://localhost:8766
      CYNIC_TIMEOUT_SECONDS: 30
      CYNIC_RETRY_COUNT: 3

      # Community Defaults
      COMMUNITY_VOTING_PERIOD_HOURS: 72
      COMMUNITY_QUORUM_PERCENTAGE: 25
      COMMUNITY_APPROVAL_THRESHOLD_PERCENTAGE: 50
      COMMUNITY_MIN_DOGS_CONSENSUS: 6

      # Features
      FEATURES_GASDF_ENABLED: "true"
      FEATURES_NEAR_EXECUTION_ENABLED: "false"
      FEATURES_LEARNING_LOOP_ENABLED: "true"
      FEATURES_AGENT_MEMBERS_ENABLED: "false"

      # Logging
      LOGGING_LEVEL: INFO
      LOGGING_FILE: /app/logs/governance_bot.log
      LOGGING_FILE_ENABLED: "true"

    # Volume mounts
    volumes:
      - governance_bot_data:/app/data
      - governance_bot_backups:/app/backups
      - governance_bot_logs:/app/logs

    # Health checks
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits (development)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    # Networking
    networks:
      - governance-network

    # Graceful shutdown
    stop_grace_period: 30s
    stop_signal: SIGTERM


# =============================================================================
# Volumes (persist data across restarts)
# =============================================================================
volumes:
  governance_bot_data:
    driver: local
  governance_bot_backups:
    driver: local
  governance_bot_logs:
    driver: local


# =============================================================================
# Networks
# =============================================================================
networks:
  governance-network:
    driver: bridge
