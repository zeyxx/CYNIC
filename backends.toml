# CYNIC Dog Configuration — Data-Centric Thresholds
# All thresholds derived from observed metrics (2026-04-26 to 2026-05-07)
# No magic numbers. Each value falsifiable by: measure > threshold → circuit opens within 60s

# Global defaults (can be overridden per dog)
[defaults]
failure_rate_threshold = 0.15        # Circuit opens at >15% failure rate
api_error_threshold = 300            # Alert at >300 accumulated api_errors
transient_error_max = 5              # Retry up to 5 transient errors
quota_grace_period_secs = 600        # Skip dog for 10min on quota exhaustion
evaluation_timeout_secs = 30         # Per-dog eval timeout (cloud API: 30s, sovereign: 60s)


# ── Dog Definitions ──

# Deterministic heuristic (always available)
[dog.deterministic-dog]
kind = "heuristic"
failure_rate_threshold = 0.01        # Very strict (heuristics should be reliable)
enabled = true

# Qwen 3.6 27B GPU (sovereign, RTX 4060 Ti)
[dog.qwen36-27b-gpu]
kind = "inference"
provider = "qwen36-27b-gpu"
model = "Qwen3.6-27B-IQ3_XXS"
failure_rate_threshold = 0.10
collapse_threshold = 50
api_error_threshold = 50
evaluation_timeout_secs = 60
enabled = true

# Qwen3-4B-Instruct-2507 CPU (sovereign, APU)
[dog.qwen3-4b-core]
kind = "inference"
provider = "qwen3-4b-core"
model = "Qwen_Qwen3-4B-Instruct-2507-Q4_K_M"
failure_rate_threshold = 0.40
collapse_threshold = 10
api_error_threshold = 200
evaluation_timeout_secs = 120
enabled = true

# Antigravity CLI (legacy runtime, backed by agy)
[dog.antigravity-cli]
kind = "inference"
provider = "agy"
model = "auto"
fleet_node = "antigravity-cli"
failure_rate_threshold = 0.50
api_error_threshold = 100
evaluation_timeout_secs = 30
enabled = true

# ── Backend Definitions ──

[backend.qwen36-27b-gpu]
base_url = "http://<TAILSCALE_GPU>:8080/v1"
model = "Qwen3.6-27B-IQ3_XXS.gguf"
context_size = 65536
json_mode = false
disable_thinking = true
timeout_secs = 60
api_key_env = "CYNIC_SOVEREIGN_KEY"
sovereign = true

[backend.qwen36-27b-gpu.remediation]
node = "cynic-gpu"
restart_command = "schtasks /Run /TN llama-server-27b"
max_retries = 3
cooldown_secs = 120

[backend.qwen3-4b-core]
base_url = "http://<TAILSCALE_CORE>:8080/v1"
model = "Qwen_Qwen3-4B-Instruct-2507-Q4_K_M.gguf"
context_size = 8192
json_mode = true
disable_thinking = true
timeout_secs = 120
api_key_env = "CYNIC_SOVEREIGN_KEY"
sovereign = true

[backend.qwen3-4b-core.remediation]
node = "localhost"
restart_command = "systemctl --user restart llama-server"
max_retries = 3
cooldown_secs = 60

[backend.antigravity-cli]
backend_type = "cli"
base_url = "agy"
model = "auto"
auth_style = "none"
context_size = 1000000
timeout_secs = 60
sovereign = false
fleet_node = "antigravity-cli"
# Antigravity CLI backed by agy

# ── Global Settings ──

[error_detection]
quota_patterns = ["TerminalQuotaError", "You have exhausted your capacity", "Rate limit exceeded", "Quota"]
transient_patterns = ["Timeout", "temporarily unavailable", "temporarily_unavailable"]
critical_patterns = ["command not found", "exit 1", "permission denied"]

[verdict]
min_voters = 2
min_confident_voters = 2
contested_threshold = 0.618

[monitoring]
failure_rate_check_interval_secs = 300
alert_threshold_critical = 0.70
alert_threshold_warning = 0.40
quota_exhaustion_alert = true
circuit_breaker_alert = true

[circuit]
open_on_consecutive_failures = 10
open_on_failure_rate = true
open_duration_secs = 300
half_open_eval_budget = 2
failure_rate_recovery_window_secs = 3600
