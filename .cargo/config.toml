[build]
# rustc 1.94 LLVM stack overflow on deep monomorphization (serde+rmcp = 47% of IR).
# rust-lang/rust #103767, #122357, #138561.
# -j 1 is the only reliable setting; -j 2 is flaky under memory pressure.
jobs = 1

[env]
# Increased to 8GB — nightly clippy on icu_properties in release mode exhausts 4GB stack.
# rustc recommends RUST_MIN_STACK=8589934592 on SIGSEGV from deep codegen stack exhaustion.
# rust-lang/rust #103767, #122357, #138561.
RUST_MIN_STACK = "8589934592"
