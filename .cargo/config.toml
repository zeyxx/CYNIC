[build]
# rustc 1.94 LLVM stack overflow on deep monomorphization (serde+rmcp = 47% of IR).
# rust-lang/rust #103767, #122357, #138561.
# -j 1 is the only reliable setting; -j 2 is flaky under memory pressure.
jobs = 1

[env]
# Increased to 2GB — tracing-subscriber 0.3.23 release build monomorphization pushes past 1GB.
# rustc recommends RUST_MIN_STACK=2147483648 on SIGSEGV from deep codegen stack exhaustion.
# rust-lang/rust #103767, #122357, #138561.
RUST_MIN_STACK = "2147483648"
