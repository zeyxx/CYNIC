# CYNIC — Codex CLI configuration
# Instructions: AGENTS.md (project root)
# Coordination: via CYNIC kernel MCP proxy -> kernel REST API

[mcp.cynic-coord]
type = "stdio"
command = ["./.cortex/mcp/run-cynic-mcp.sh"]
# Wrapper sources ~/.cynic-env locally, then execs /home/user/bin/cynic-kernel-mcp.
# Do not put real CYNIC_REST_ADDR or CYNIC_API_KEY values in this repo.
