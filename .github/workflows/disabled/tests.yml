name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov

    - name: Lint with flake8 (HARD FAIL)
      run: |
        pip install flake8
        echo "🔍 Checking for syntax errors..."
        flake8 cynic --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "✅ Syntax check passed"
        echo ""
        echo "⚠️ Style warnings (non-blocking):"
        flake8 cynic --count --max-complexity=10 --max-line-length=127 --statistics || true

    - name: Test with pytest (REALTIME VALIDATION)
      run: |
        echo "🚀 Starting test suite..."
        pytest tests/ \
          --cov=cynic \
          --cov-report=xml \
          --cov-report=term-missing \
          -v \
          --tb=short \
          --strict-markers
        echo "✅ All tests passed"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generate test report (HTML)
      if: always()
      run: |
        pip install pytest-html
        pytest tests/ \
          --cov=cynic \
          --cov-report=html \
          --html=report.html \
          --self-contained-html \
          --tb=short || true
        echo "📊 Test report generated"

    - name: Upload test report artifact
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report-${{ matrix.python-version }}
        path: report.html
        if-no-files-found: warn

  coverage-gate:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov coverage

    - name: Run tests with coverage (QUALITY GATE)
      run: |
        echo "📈 Measuring test coverage..."
        pytest tests/ \
          --cov=cynic \
          --cov-report=xml \
          --cov-report=term \
          -v \
          --tb=short

    - name: Enforce coverage threshold (HARD MINIMUM 75%)
      run: |
        python << 'EOF'
        import xml.etree.ElementTree as ET
        import sys

        MIN_COVERAGE = 75.0
        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            line_rate = float(root.get('line-rate', 0))
            coverage_pct = line_rate * 100

            print(f"\n{'='*60}")
            print(f"📊 Code Coverage: {coverage_pct:.1f}%")
            print(f"{'='*60}")

            if coverage_pct >= MIN_COVERAGE:
                print(f"✅ PASS: Coverage meets minimum ({MIN_COVERAGE}%)")
                sys.exit(0)
            else:
                print(f"❌ FAIL: Coverage {coverage_pct:.1f}% < {MIN_COVERAGE}% THRESHOLD")
                print(f"\nAction required:")
                print(f"  - Increase test coverage to >= {MIN_COVERAGE}%")
                print(f"  - Current gap: {MIN_COVERAGE - coverage_pct:.1f}%")
                sys.exit(1)
        except Exception as e:
            print(f"❌ ERROR reading coverage: {e}")
            sys.exit(1)
        EOF

  test-summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [test, coverage-gate]

    steps:
    - name: Report CI/CD Status (LOUD & CLEAR)
      env:
        TEST_RESULT: ${{ needs.test.result }}
        COVERAGE_RESULT: ${{ needs.coverage-gate.result }}
      run: |
        echo ""
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║              CYNIC CI/CD RESULTS                       ║"
        echo "╚════════════════════════════════════════════════════════╝"
        echo ""

        TEST_PASS="false"
        COVERAGE_PASS="false"

        if [ "$TEST_RESULT" == "success" ]; then
          echo "✅ Tests: PASSED"
          TEST_PASS="true"
        else
          echo "❌ Tests: FAILED (see logs above)"
          TEST_PASS="false"
        fi

        if [ "$COVERAGE_RESULT" == "success" ]; then
          echo "✅ Coverage: PASSED (>= 75%)"
          COVERAGE_PASS="true"
        else
          echo "❌ Coverage: FAILED (< 75% threshold)"
          COVERAGE_PASS="false"
        fi

        echo ""
        echo "╔════════════════════════════════════════════════════════╗"

        if [ "$TEST_PASS" == "true" ] && [ "$COVERAGE_PASS" == "true" ]; then
          echo "║        🚀 BUILD PASSED - READY FOR MERGE 🚀           ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          exit 0
        else
          echo "║        ❌ BUILD FAILED - FIX BEFORE MERGE ❌          ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "Required Actions:"
          if [ "$TEST_PASS" == "false" ]; then
            echo "  1. Fix failing tests (see test logs)"
          fi
          if [ "$COVERAGE_PASS" == "false" ]; then
            echo "  2. Increase test coverage to >= 75%"
          fi
          echo ""
          exit 1
        fi
