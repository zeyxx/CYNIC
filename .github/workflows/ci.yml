name: CYNIC CI - Infrastructure Hardening

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  rigor-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest httpx pydantic surrealdb playwright
          playwright install chromium

      - name: Lint & Format (Ruff)
        run: ruff check .

      - name: Type Check (Mypy)
        run: mypy --ignore-missing-imports cynic/

      - name: Core Unit Tests
        run: pytest tests/

      - name: Fractal Isolation Test (Zero-Leak)
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python scripts/verify_fractal_trace.py
